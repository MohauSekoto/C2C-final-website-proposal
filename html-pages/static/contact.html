<script>
    fetch('../shared/header.html').then(r => r.text()).then(d => document.body.insertAdjacentHTML('afterbegin', d.split('<main')[0] + '<main class="flex-grow">'));
</script>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Contact Us - KasiBuy</title>
</head>
<body class="bg-zinc-50 min-h-screen flex flex-col">

<div class="container mx-auto px-4 py-16 max-w-xl pt-24">
    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold mb-4">Contact Us</h1>
        <p class="text-zinc-600">Have a question or need help with an order? Send us a message.</p>
    </div>
    
    <div class="bg-white p-8 rounded-3xl shadow-sm border border-zinc-200">
        <form id="contactForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-zinc-700 mb-2">Your Name</label>
                <input type="text" name="name" required class="w-full px-4 py-3 rounded-xl border border-zinc-300 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-zinc-700 mb-2">Email Address</label>
                <input type="email" name="email" required class="w-full px-4 py-3 rounded-xl border border-zinc-300 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-zinc-700 mb-2">Message</label>
                <textarea name="message" rows="5" required class="w-full px-4 py-3 rounded-xl border border-zinc-300 focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none transition-all"></textarea>
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition-colors">
                Send Message
            </button>
        </form>
        <div id="formResult" class="mt-4 text-center hidden font-medium"></div>
    </div>
</div>

<script>
    fetch('../shared/footer.html').then(r => r.text()).then(d => document.body.insertAdjacentHTML('beforeend', '</main>' + d.split('</main>')[1]));

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        const result = document.getElementById('formResult');
        
        btn.textContent = 'Sending...';
        btn.disabled = true;
        
        const data = {
            name: e.target.name.value,
            email: e.target.email.value,
            message: e.target.message.value
        };

        try {
            const res = await fetch('http://localhost:8000/php-services/contact/send-message.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const json = await res.json();
            
            result.textContent = json.message || json.error;
            result.className = `mt-4 text-center font-medium ${json.success ? 'text-green-600' : 'text-red-600'}`;
            result.classList.remove('hidden');
            
            if (json.success) e.target.reset();
        } catch (err) {
            result.textContent = 'Failed to connect to the server. (Requires PHP services running)';
            result.className = 'mt-4 text-center font-medium text-red-600';
            result.classList.remove('hidden');
        } finally {
            btn.textContent = 'Send Message';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
